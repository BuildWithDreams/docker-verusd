services:
  vrsc:
    hostname: ${VERUSD_HOSTNAME}
    image: buildwithdreams/verusd:1.2.16
    command: verusd ${VERUSD_BOOTSTRAP_FLAG}
    volumes:
      - ./data_dir:/root/.komodo/VRSC
      - /home/dream-hermes-agent/.zcash-params:/root/.zcash-params:ro
    ports:
      - "127.0.0.1:${LOCAL_RPC_PORT}:${VERUSD_RPC_PORT}"
    networks:
      pbaas_network:
        ipv4_address: ${VERUSD_IPV4}
    logging:
      driver: "json-file"
    stop_grace_period: 2m

networks:
  pbaas_network:
    name: ${DOCKER_NETWORK_NAME}
    external: true

